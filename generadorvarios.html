<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador Festival</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;padding:20px}

.ticket{
 width:1024px;
 height:768px;
 margin:10px auto;
 position:relative;
 background:linear-gradient(120deg,#49c6ff,#f4a3ff);
 overflow:hidden;
}

.title{
 position:absolute;
 top:260px;
 left:100px;
 font-size:50px;
 font-weight:900;
}

.text{
 position:absolute;
 top:420px;
 left:300px;
 width:350px;
 text-align:center;
 font-size:22px;
}

.num{
 position:absolute;
 bottom:80px;
 left:150px;
 background:white;
 padding:10px;
 font-weight:900;
}

.qr{
 position:absolute;
 right:20px;
 bottom:20px;
 width:140px;
 height:140px;
 background:white;
}
</style>
</head>

<body>

<input id="inicio" value="526"><br>
<input id="cantidad" value="10"><br>

<button onclick="generar()">Generar</button>

<div id="c"></div>

<script>
function generar(){
 const c=document.getElementById("c");
 c.innerHTML="";

 let inicio=parseInt(document.getElementById("inicio").value);
 let cantidad=parseInt(document.getElementById("cantidad").value);

 for(let i=0;i<cantidad;i++){
   let n=inicio+i;

   let div=document.createElement("div");
   div.className="ticket";
   div.innerHTML=`
     <div class="title">FESTIVAL DE COLORES Y AGUA</div>
     <div class="text">
       Debe estar a las 19:00...<br>
       Traiga ropa blanca
     </div>
     <div class="num">${n}</div>
     <div id="qr-${i}" class="qr"></div>
   `;

   c.appendChild(div);

   new QRCode(document.getElementById("qr-"+i),{
     text:"ENT-"+n,
     width:120,
     height:120
   });
 }
}
</script>

</body>
</html>
