<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador EXACTO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{font-family:Arial;background:#eee;padding:20px}

.ticket{
 width:1024px;
 height:512px;
 position:relative;
 margin:10px auto;
 background:url('plantilla.png') no-repeat center/cover;
}

/* tapa número viejo */
.num-box{
 position:absolute;
 left:155px;
 top:390px;
 width:70px;
 height:60px;
 background:white;
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:900;
 font-size:20px;
}

/* tapa QR viejo */
.qr-box{
 position:absolute;
 right:20px;
 bottom:20px;
 width:140px;
 height:140px;
 background:white;
}

</style>
</head>

<body>

<input id="inicio" value="526"><br>
<input id="cantidad" value="10"><br>

<button onclick="generar()">Generar</button>
<button onclick="pdf()">PDF</button>

<div id="c"></div>

<script>

function generar(){
 const c=document.getElementById("c");
 c.innerHTML="";

 let inicio=parseInt(document.getElementById("inicio").value);
 let cantidad=parseInt(document.getElementById("cantidad").value);

 for(let i=0;i<cantidad;i++){
   let n=inicio+i;

   let t=document.createElement("div");
   t.className="ticket";

   t.innerHTML=`
     <div class="num-box">${n}</div>
     <div id="qr-${i}" class="qr-box"></div>
   `;

   c.appendChild(t);

   new QRCode(document.getElementById("qr-"+i),{
     text:"ENT-"+n,
     width:140,
     height:140
   });
 }
}

async function pdf(){
 const { jsPDF } = window.jspdf;
 const pdf = new jsPDF({orientation:'landscape'});

 const t=document.querySelectorAll(".ticket");

 for(let i=0;i<t.length;i++){
   const canvas=await html2canvas(t[i]);
   const img=canvas.toDataURL("image/png");

   if(i>0) pdf.addPage();
   pdf.addImage(img,"PNG",0,0,297,210);
 }

 pdf.save("entradas.pdf");
}

</script>

</body>
</html>
