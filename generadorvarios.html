<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{font-family:Arial;background:#f6f7fb;padding:20px}
.ticket{width:800px;height:250px;background:#111;color:#fff;margin:10px;padding:20px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.qr{width:120px;height:120px;background:#fff}
</style>
</head>

<body>

<input id="evento" placeholder="Evento"><br>
<input id="inicio" type="number" value="1"><br>
<input id="cantidad" type="number" value="10"><br>

<button onclick="generar()">Generar</button>
<button onclick="pdf()">PDF</button>
<button onclick="zip()">ZIP</button>

<div id="c"></div>

<script>
let codigos=[];

function pad(n){return String(n).padStart(4,'0')}

function generar(){
  const c=document.getElementById("c");
  c.innerHTML="";
  codigos=[];

  const evento=document.getElementById("evento").value;
  const inicio=parseInt(document.getElementById("inicio").value);
  const cantidad=parseInt(document.getElementById("cantidad").value);

  for(let i=0;i<cantidad;i++){
    const num=inicio+i;
    const codigo="ENT-"+pad(num);
    codigos.push(codigo);

    const div=document.createElement("div");
    div.className="ticket";
    div.innerHTML=`
      <div>
        <h2>${evento}</h2>
        <p>${codigo}</p>
      </div>
      <div id="qr-${i}" class="qr"></div>
    `;

    c.appendChild(div);

    new QRCode(document.getElementById(`qr-${i}`),{
      text:codigo,
      width:120,
      height:120
    });
  }
}

async function pdf(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const t=document.querySelectorAll(".ticket");

  for(let i=0;i<t.length;i++){
    const canvas=await html2canvas(t[i]);
    const img=canvas.toDataURL("image/png");

    if(i>0) pdf.addPage();
    pdf.addImage(img,"PNG",0,0);
  }

  pdf.save("tickets.pdf");
}

async function zip(){
  const zip=new JSZip();
  const t=document.querySelectorAll(".ticket");

  for(let i=0;i<t.length;i++){
    const canvas=await html2canvas(t[i]);
    const img=canvas.toDataURL("image/png").split(",")[1];

    zip.file(codigos[i]+".png",img,{base64:true});
  }

  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tickets.zip";
  a.click();
}
</script>

</body>
</html>
